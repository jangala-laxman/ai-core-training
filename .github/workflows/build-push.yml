name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: jangala-laxman

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push trainer image
        uses: docker/build-push-action@v5
        with:
          context: ./training
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/nse-trainer:latest

      - name: Build and push inference image
        uses: docker/build-push-action@v5
        with:
          context: ./inference
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/nse-infer:latest
