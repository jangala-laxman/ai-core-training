apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nse-model-infer
  annotations:
    scenarios.ai.sap.com/description: "Run batch inference using trained NSE model to rank stocks"
    scenarios.ai.sap.com/name: "NSE Stock Inference"
    executables.ai.sap.com/description: "Downloads model from S3, scores latest NSE data, outputs ranked recommendations"
    executables.ai.sap.com/name: "nse-infer"
  labels:
    scenarios.ai.sap.com/id: "nse-stock-scenario"
    ai.sap.com/version: "1.0.0"
spec:
  arguments:
    parameters:
      - name: tickers
        value: "RELIANCE.NS,TCS.NS,INFY.NS,HDFCBANK.NS,WIPRO.NS,LT.NS,ICICIBANK.NS,SBIN.NS"
      - name: model_s3_key
        value: ""
      - name: ticker_map_s3_key
        value: ""
      - name: data_url
        value: ""
  entrypoint: infer
  templates:
    - name: infer
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: ghcr.io/jangala-laxman/nse-infer:latest
        command: [python, infer.py]
        env:
          - name: TICKERS
            value: "{{workflow.parameters.tickers}}"
          - name: MODEL_S3_KEY
            value: "{{workflow.parameters.model_s3_key}}"
          - name: TICKER_MAP_S3_KEY
            value: "{{workflow.parameters.ticker_map_s3_key}}"
          - name: DATA_URL
            value: "{{workflow.parameters.data_url}}"
          - name: OUTPUT_PATH
            value: /tmp/output
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: AWS_SECRET_ACCESS_KEY
          - name: S3_BUCKET
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: bucket
          - name: S3_REGION
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: region
