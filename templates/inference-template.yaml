apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nse-model-infer
  annotations:
    scenarios.ai.sap.com/description: "Run batch inference using trained NSE model to rank stocks"
    scenarios.ai.sap.com/name: "NSE Stock Inference"
    executables.ai.sap.com/description: "Loads trained model, fetches live NSE data, outputs ranked recommendations"
    executables.ai.sap.com/name: "nse-infer"
  labels:
    scenarios.ai.sap.com/id: "nse-stock-scenario"
    ai.sap.com/version: "1.0.0"
spec:
  arguments:
    parameters:
      - name: tickers
        value: "RELIANCE.NS,TCS.NS,INFY.NS,HDFCBANK.NS,WIPRO.NS,LT.NS,ICICIBANK.NS,SBIN.NS"
  entrypoint: infer
  templates:
    - name: infer
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      inputs:
        artifacts:
          - name: model
            path: /tmp/input/nse_model.pkl
          - name: ticker-map
            path: /tmp/input/ticker_map.json
      outputs:
        artifacts:
          - name: recommendations
            path: /tmp/output/recommendations.json
            archive:
              none: {}
      container:
        image: ghcr.io/jangala-laxman/nse-infer:latest
        command: [python, infer.py]
        env:
          - name: TICKERS
            value: "{{workflow.parameters.tickers}}"
          - name: MODEL_PATH
            value: /tmp/input/nse_model.pkl
          - name: TICKER_MAP_PATH
            value: /tmp/input/ticker_map.json
          - name: OUTPUT_PATH
            value: /tmp/output
