apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: nse-model-trainer
  annotations:
    scenarios.ai.sap.com/description: "Train NSE stock prediction model on last 30 days of data"
    scenarios.ai.sap.com/name: "NSE Stock Trainer"
    executables.ai.sap.com/description: "Downloads pre-fetched NSE data via presigned URL, trains RandomForest, uploads artifacts to S3"
    executables.ai.sap.com/name: "nse-trainer"
  labels:
    scenarios.ai.sap.com/id: "nse-stock-scenario"
    ai.sap.com/version: "1.0.0"
spec:
  arguments:
    parameters:
      - name: tickers
        value: "RELIANCE.NS,TCS.NS,INFY.NS,HDFCBANK.NS,WIPRO.NS,LT.NS,ICICIBANK.NS,SBIN.NS"
      - name: period
        value: "30d"
      - name: data_url
        value: ""
  entrypoint: train
  templates:
    - name: train
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: ghcr.io/jangala-laxman/nse-trainer:latest
        command: [python, train.py]
        env:
          - name: DATA_URL
            value: "{{workflow.parameters.data_url}}"
          - name: TICKERS
            value: "{{workflow.parameters.tickers}}"
          - name: PERIOD
            value: "{{workflow.parameters.period}}"
          - name: OUTPUT_PATH
            value: /tmp/output
          - name: S3_KEY_PREFIX
            value: "nse-ai-core/models/{{workflow.name}}"
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: AWS_SECRET_ACCESS_KEY
          - name: S3_BUCKET
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: bucket
          - name: S3_REGION
            valueFrom:
              secretKeyRef:
                name: default-object-store-secret
                key: region
